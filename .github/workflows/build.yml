name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev wget golang gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Full Build Process
        run: |
          # 1. Setup agbcc Compiler
          git clone https://github.com/pret/agbcc.git
          cd agbcc
          ./install.sh ../
          cd ..
          echo "✅ Compiler Installed"

          # 2. Locate Project Root
          # This specifically searches for the folder containing the CrystalDust code
          PROJ_PATH=$(find . -maxdepth 4 -name "Makefile" -exec grep -l "src" {} + | head -n 1 | xargs dirname)
          echo "✅ Project Found at: $PROJ_PATH"

          # 3. Fix Environment
          # Cleans Windows line endings which cause 'Segmentation Fault' or 'Error 139'
          find "$PROJ_PATH" -type f -exec sed -i 's/\r$//' {} +
          
          # Copy baserom.gba (ensure this file is in your repo root)
          find . -name "baserom.gba" -exec cp {} "$PROJ_PATH/baserom.gba" \;

          # 4. Build Tools and ROM
          cd "$PROJ_PATH"
          make -C tools clean
          make -C tools
          # Disables -Werror to prevent minor code warnings from stopping the build
          sed -i 's/-Werror//g' Makefile || echo "Skip"
          make clean
          make WERROR=0

      - name: Upload CrystalDust ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Final-Build
          path: |
            **/*.gba
            !**/baserom.gba
