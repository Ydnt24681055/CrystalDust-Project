name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev wget golang gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Force Clean Build
        run: |
          # 1. COMPLETELY IGNORE existing folders and download fresh agbcc
          # This stops the 'cannot stat agbcc' error forever.
          rm -rf agbcc
          git clone https://github.com/pret/agbcc.git
          cd agbcc
          ./install.sh "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          echo "✅ Fresh compiler installed."

          # 2. Find where the project is
          PROJ_PATH=$(find . -maxdepth 3 -name "Makefile" -exec grep -l "src" {} + | head -n 1 | xargs dirname)
          echo "✅ Project found at: $PROJ_PATH"

          # 3. Move your baserom and fix Windows file issues
          find . -name "baserom.gba" -exec cp {} "$PROJ_PATH/baserom.gba" \;
          find "$PROJ_PATH" -type f -exec sed -i 's/\r$//' {} +

          # 4. Build Tools and ROM
          cd "$PROJ_PATH"
          make -C tools
          sed -i 's/-Werror//g' Makefile || echo "Done"
          make clean
          make WERROR=0

      - name: Upload Finished ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Final-Build
          path: |
            **/*.gba
            !**/baserom.gba
