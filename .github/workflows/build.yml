name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev wget golang gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Full Build Process
        run: |
          # 1. Install agbcc from the specific folder you uploaded
          echo "🚀 Installing compiler from tools/agbcc..."
          cd tools/agbcc
          chmod +x install.sh
          ./install.sh ../../
          cd ../../

          # 2. Locate Project Root (Finds the Makefile)
          PROJ_PATH=$(find . -maxdepth 4 -name "Makefile" -exec grep -l "src" {} + | head -n 1 | xargs dirname)
          echo "✅ Project Found at: $PROJ_PATH"

          # 3. Clean environment and fix line endings
          find "$PROJ_PATH" -type f -exec sed -i 's/\r$//' {} +
          find . -name "baserom.gba" -exec cp {} "$PROJ_PATH/baserom.gba" \;

          # 4. Build Tools and the Game
          cd "$PROJ_PATH"
          make -C tools clean
          make -C tools
          sed -i 's/-Werror//g' Makefile || echo "Done"
          make clean
          make WERROR=0

      - name: Upload CrystalDust ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Final-Build
          path: |
            **/*.gba
            !**/baserom.gba
