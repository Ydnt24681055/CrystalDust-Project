name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev wget golang gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Full Build Process
        run: |
          # 1. Clean Install of the agbcc Compiler
          # We download it fresh to avoid the 'No such file' error
          git clone https://github.com/pret/agbcc.git
          cd agbcc
          ./install.sh "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          echo "✅ Compiler successfully installed to workspace root."

          # 2. Find the CrystalDust Project Folder
          PROJ_PATH=$(find . -maxdepth 3 -name "Makefile" -exec grep -l "src" {} + | head -n 1 | xargs dirname)
          echo "✅ Project Found at: $PROJ_PATH"

          # 3. Setup the Baserom
          # This copies your uploaded baserom.gba into the project folder
          find . -name "baserom.gba" -exec cp {} "$PROJ_PATH/baserom.gba" \;
          
          # 4. Fix Windows vs Linux file endings
          find "$PROJ_PATH" -type f -exec sed -i 's/\r$//' {} +

          # 5. Build Tools and the Game
          cd "$PROJ_PATH"
          make -C tools clean
          make -C tools
          # Disabling -Werror prevents minor code warnings from stopping the build
          sed -i 's/-Werror//g' Makefile || echo "Done"
          make clean
          make WERROR=0

      - name: Upload CrystalDust ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Final-Build
          path: |
            **/*.gba
            !**/baserom.gba
