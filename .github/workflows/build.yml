name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev wget golang gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build from Root
        run: |
          # 1. Use the agbcc folder you just moved to the root
          echo "🚀 Installing compiler from root..."
          cd agbcc
          chmod +x install.sh
          # This installs the compiler to the main workspace
          ./install.sh "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"

          # 2. Locate the Project (Finds the Makefile)
          PROJ_PATH=$(find . -maxdepth 3 -name "Makefile" -exec grep -l "src" {} + | head -n 1 | xargs dirname)
          echo "✅ Project identified at: $PROJ_PATH"

          # 3. Setup Baserom and Fix Windows Line Endings
          # This moves your uploaded baserom into the project folder
          find . -name "baserom.gba" -exec cp {} "$PROJ_PATH/baserom.gba" \;
          find "$PROJ_PATH" -type f -exec sed -i 's/\r$//' {} +

          # 4. Final Compile
          cd "$PROJ_PATH"
          make -C tools clean
          make -C tools
          # Disabling -Werror prevents small warnings from stopping the build
          sed -i 's/-Werror//g' Makefile || echo "Done"
          make clean
          make WERROR=0

      - name: Upload Final ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Final-Build
          path: |
            **/*.gba
            !**/baserom.gba
