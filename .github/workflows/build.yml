name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev wget golang gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Full Build Process
        run: |
          # 1. Official Compiler Setup
          git clone https://github.com/pret/agbcc.git
          cd agbcc
          ./install.sh ../
          cd ..
          echo "✅ Compiler Ready"

          # 2. Find Project and Baserom
          PROJ_PATH=$(find . -maxdepth 3 -name "Makefile" -exec grep -l "src" {} + | head -n 1 | xargs dirname)
          BASEROM_PATH=$(find . -name "baserom.gba" | head -n 1)
          
          if [ -z "$BASEROM_PATH" ]; then
            echo "❌ ERROR: baserom.gba not found in repo!"
            exit 1
          fi
          
          echo "✅ Project: $PROJ_PATH"
          echo "✅ Baserom: $BASEROM_PATH"

          # 3. Prepare Environment
          cp "$BASEROM_PATH" "$PROJ_PATH/baserom.gba"
          find "$PROJ_PATH" -type f -exec sed -i 's/\r$//' {} +

          # 4. Build Tools and ROM
          cd "$PROJ_PATH"
          make -C tools clean
          make -C tools
          sed -i 's/-Werror//g' Makefile || echo "Done"
          make clean
          make WERROR=0

      - name: Upload CrystalDust ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Final-Build
          path: |
            **/*.gba
            !**/baserom.gba
