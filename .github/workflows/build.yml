name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev wget golang gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Force Compiler & Build
        run: |
          # 1. Install Compiler to a fixed location
          # This bypasses the 'No such file' error by using the full system path
          git clone https://github.com/pret/agbcc.git
          cd agbcc
          ./install.sh $GITHUB_WORKSPACE
          cd $GITHUB_WORKSPACE
          echo "✅ Compiler successfully installed to $GITHUB_WORKSPACE"

          # 2. Find the Makefile (Searching up to 3 folders deep)
          PROJ_PATH=$(find . -maxdepth 3 -name "Makefile" -exec grep -l "src" {} + | head -n 1 | xargs dirname)
          echo "✅ Project folder identified: $PROJ_PATH"

          # 3. Setup the ROM environment
          # This places your uploaded baserom.gba exactly where the code needs it
          find . -name "baserom.gba" -exec cp {} "$PROJ_PATH/baserom.gba" \;
          find "$PROJ_PATH" -type f -exec sed -i 's/\r$//' {} +

          # 4. Compile the Game
          cd "$PROJ_PATH"
          make -C tools clean
          make -C tools
          # Disabling -Werror to ensure small code warnings don't stop the build
          sed -i 's/-Werror//g' Makefile || echo "Done"
          make clean
          make WERROR=0

      - name: Upload Final ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Build
          path: |
            **/*.gba
            !**/baserom.gba
