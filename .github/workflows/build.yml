name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev wget golang gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build from Root
        run: |
          # 1. Install the agbcc folder you moved to the main directory
          if [ -d "agbcc" ]; then
            echo "✅ agbcc found in root. Installing..."
            cd agbcc
            chmod +x install.sh
            ./install.sh "$GITHUB_WORKSPACE"
            cd "$GITHUB_WORKSPACE"
          else
            echo "❌ agbcc folder NOT found in the main directory!"
            exit 1
          fi

          # 2. Locate Project Root
          PROJ_PATH=$(find . -maxdepth 3 -name "Makefile" -exec grep -l "src" {} + | head -n 1 | xargs dirname)
          
          # 3. Setup Baserom and Fix Windows Line Endings
          find . -name "baserom.gba" -exec cp {} "$PROJ_PATH/baserom.gba" \;
          find "$PROJ_PATH" -type f -exec sed -i 's/\r$//' {} +

          # 4. Final Compile
          cd "$PROJ_PATH"
          make -C tools clean
          make -C tools
          sed -i 's/-Werror//g' Makefile || echo "Done"
          make clean
          make WERROR=0

      - name: Upload Finished ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Final-Build
          path: |
            **/*.gba
            !**/baserom.gba
